[build]
  command = "npm run build"
  publish = "dist"

# SPA：所有路径回退到 index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# 苹果描述文件 .mobileconfig 需正确 MIME，iOS 才能识别为“描述文件”
[[headers]]
  for = "/*.mobileconfig"
  [headers.values]
    Content-Type = "application/x-apple-aspen-config"
